# Demo rápido: dispara a cada 30s. Copie para flows/, selecione no rail e dê ▶️.
# Em LOOM_RUNNER=fake roda de mentira (custo zero) só pra você VER o ciclo + o
# terminal. Tire o fake e ele roda um claude haiku de verdade a cada 30s.
id: demo-rapido
name: Demo rápido (30s)
version: 1
schedule: "a cada 30 s"
blackboardDir: demo-rapido
budget:
  maxCyclesPerArm: 1
  maxTokensPerRun: 120000
  # $1 era baixo demais: o pior-caso de UM run Sonnet é ~$1,056, então qualquer
  # nó Sonnet (modelo padrão de agente novo) era NEGADO pelo guard. $2 = DEFAULT.
  maxUsdPerRun: 2
  maxTokensPerFlow: 500000
  maxUsdPerFlow: 10
  maxConcurrentAgents: 1
  convergenceWindow: 2
nodes:
  - id: trigger
    type: Trigger
    title: A cada 30s
    role: dispara a cada 30 segundos
    model: claude-haiku-4-5
    prompt: ""
    linkedContexts: []
    position:
      x: 99.10714285714286
      y: 220
    trigger:
      kind: Intervalo
      interval: 30 s
  - id: agente
    type: Analyst
    title: Agente
    role: escreve uma nota com a hora
    model: claude-haiku-4-5
    prompt: |
      Escreva (ou sobrescreva) o arquivo nota.md com UMA frase curta dizendo
      a hora atual. Não escreva mais nada.
    linkedContexts:
      - nota.md
    position:
      x: 400
      y: 220
    produces:
      - nota.md
  - id: n_fwmf8yx
    type: Executor
    title: Executor
    role: Descreva o agente
    model: claude-sonnet-4-6
    prompt: escreve no nota.md "sou o segundo agente"
    linkedContexts: []
    position:
      x: 694.0588235294118
      y: 239.66748218274654
    schedule: ao receber do agente de análise
    contextIsolation: false
edges:
  - id: e1
    from: trigger
    to: agente
  - id: e_e7uqzy7
    from: agente
    to: n_fwmf8yx
    phase: 5.991117816444191
